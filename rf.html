<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-secondary">
    <div class="container py-5">
        <form action="">
            <div class="row mt-5 justify-content-center">
                <div class="col-lg-4 shadow p-4 border rounded-3 bg-light">
                    <div class="row justify-content-center">
                        <div class="col-lg-4">
                            <hr>
                        </div>
                        <div class="col-lg-4 text-center">
                            <h3>Register</h3>
                        </div>
                        <div class="col-lg-4">
                            <hr>
                        </div>
                    </div>
                    <div class="row justify-content-center">

                        <div class="mb-4 text-center">
                            <span class="text-secondary">Create your account. It's free and only takes a minute.</span>
                        </div>

                        <div class="col-lg-6 mb-4">
                            <input type="text" name="" id="" class="form-control" placeholder="First Name" />
                        </div>

                        <div class="col-lg-6 mb-4">
                            <input type="text" name="" id="" class="form-control" placeholder="Last Name" />
                        </div>
     
                        <div class="mb-4">
                            <input type="email" name="" id="" class="form-control" placeholder="Email">
                        </div>

                        <div class="mb-4">
                            <input type="password" name="" id="" class="form-control" placeholder="Password">
                        </div>

                        <div class="mb-4">
                            <input type="password" name="" id="" class="form-control" placeholder="Conferm Password">
                        </div>

                        <div class="mb-4">
                            <input type="checkbox"><span class="text-secondary"> I accept the <span
                                    class="text-success">Terms of use </span>& <span class="text-success">Privacy
                                    Policy</span></span>
                            </span>
                        </div>

                        <div class="col-lg-12 mb-4">
                            <input type="submit" value="Register Now" class="form-control btn"
                                style="background:linear-gradient(rgb(61, 194, 114),rgb(28, 113, 57)); color: rgb(255, 255, 255);" />
                        </div>

                    </div>
                </div>
                <div class="row justify-content-center mt-3">
                    <div class="col-lg-12 text-center">
                        <span class="text-light">
                            Already have an account? <u> Sign in</u></span>
                        </span>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
