<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
    }

    #calculator {
      width: 300px;
      background: #000;
      padding: 20px;
      border-radius: 20px;
    }

    #display {
      width: 100%;
      height: 60px;
      margin-bottom: 20px;
      border: none;
      border-radius: 8px;
      font-size: 24px;
      text-align: right;
      padding: 10px;
      background: #fff;
    }

    #buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 20px;
      font-size: 20px;
      border: none;
      border-radius: 8px;
      background: #ccc;
      cursor: pointer;
      box-shadow: 0 5px #999;
      transition: all 0.1s ease;
    }

    button:hover {
      background: #bdbdbd;
    }

    button:active {
      box-decoration-break: 0 2px #666;
      transform: translateY(3px);
    }

    #btn-clear {
      background: #ff3b30;
      color: white;
    }

    #btn-equal {
      grid-column: span 4;
      background: #ff9500;
      color: white;
    }
  </style>
</head>

<body>
  <div id="calculator">
    <input type="text" id="display" placeholder="0" readonly />
    <div id="buttons">
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button>/</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button>*</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button>-</button>

      <button>.</button>
      <button>0</button>
      <button>+</button>
      <button id="btn-clear">C</button>

      <button id="btn-equal">=</button>
    </div>
  </div>
  <script>
    const display = document.getElementById("display");
    const buttons = document.querySelectorAll("button");
    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        const value = button.textContent;
        if (value === "C") {
          display.value = "";
        } else if (value === "=") {
          try {
            display.value = eval(display.value);
          } catch {
            display.value = "Error";
          }
        } else {
          display.value += value;
        }
      });
    });
  </script>
</body>

</html>
